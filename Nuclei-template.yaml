    method: GET
    path: ["{{BaseURL}}/wp-content/plugins/team/readme.txt"]
    headers: {User-Agent: "{{rand_user_agent}}"}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words: ["Stable tag:"]
      - type: dsl
        dsl: ["contains(body,'Stable tag: 5.0.') || contains(body,'Stable tag: 4.') || contains(body,'Stable tag: 3.') || contains(body,'Stable tag: 2.') || contains(body,'Stable tag: 1.')"]
        condition: or
    internal: true

  - id: ver-wp-automatic
    method: GET
    path: ["{{BaseURL}}/wp-content/plugins/wp-automatic/readme.txt"]
    headers: {User-Agent: "{{rand_user_agent}}"}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words: ["Stable tag:"]
      - type: dsl
        dsl: ["contains(body,'Stable tag: 3.5.1') || contains(body,'Stable tag: 3.5.0') || contains(body,'Stable tag: 3.4.') || contains(body,'Stable tag: 3.3.') || contains(body,'Stable tag: 3.2.') || contains(body,'Stable tag: 3.1.') || contains(body,'Stable tag: 3.0.') || contains(body,'Stable tag: 2.') || contains(body,'Stable tag: 1.')"]
