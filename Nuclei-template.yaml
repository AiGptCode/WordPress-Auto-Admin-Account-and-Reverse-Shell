# ==============================================================================
# AiGPT Multi‑Vector WordPress Vulnerability Detection Template (FIXED)
# Repository: https://github.com/AiGptCode/AiGPT-WordPress-Exploitation-Framework
# Version:  3.2.1
# Author:   AiGptCode
# License:  MIT
#
# This template is fully functional and will produce a finding when
# any of the 20+ supported vulnerable plugins is detected at a
# version within the exploitable range.
#
# USAGE:
#   nuclei -t aigpt-detection.yaml -l targets.txt -o results.json
#   nuclei -t aigpt-detection.yaml -u https://example.com -v
# ==============================================================================

id: aigpt-wordpress-multi-cve-detection-v3

info:
  name: "AiGPT Framework — WordPress Multi‑CVE Vulnerability Detection"
  author: AiGptCode
  severity: critical
  description: |
    Detects WordPress plugins vulnerable to unauthenticated admin creation,
    token hijack, SQL injection, or file upload, as exploited by the AiGPT
    framework. All checks are non‑intrusive (no accounts created, no files
    written). A finding is raised only if the plugin is present AND the
    extracted version falls inside the known vulnerable range.
  reference:
    - https://github.com/AiGptCode/AiGPT-WordPress-Exploitation-Framework
  tags: cve,cve2025,cve2026,wordpress,aigpt,detection,multi-cve

# Global variables for fingerprinting and vulnerability flags
variables:
  fp_suretriggers: false
  fp_king_addons: false
  fp_simple_user_reg: false
  fp_opal_estate: false
  fp_truelysell: false
  fp_mobile_builder: false
  fp_ai_engine: false
  fp_pie_register: false
  fp_frontend_admin: false
  fp_tax_hdm: false
  fp_woo_designer: false
  fp_ninja_forms: false
  fp_user_reg_adv: false
  fp_user_reg_membership: false
  fp_breeze_cache: false
  fp_listeo_core: false
  fp_betterdocs: false
  fp_team_plugin: false
  fp_wp_automatic: false

  vuln_suretriggers: false
  vuln_king_addons: false
  vuln_simple_user_reg: false
  vuln_opal_estate: false
  vuln_truelysell: false
  vuln_mobile_builder: false
  vuln_ai_engine: false
  vuln_pie_register: false
  vuln_frontend_admin: false
  vuln_tax_hdm: false
  vuln_woo_designer: false
  vuln_ninja_forms: false
  vuln_user_reg_adv: false
  vuln_user_reg_membership: false
  vuln_breeze_cache: false
  vuln_listeo_core: false
  vuln_betterdocs: false
  vuln_team_plugin: false
  vuln_wp_automatic: false

flow: |
  /* Phase 1 — Fingerprint all plugins in parallel */
  fp_suretriggers     = http('fp-suretriggers');
  fp_king_addons      = http('fp-king-addons');
  fp_simple_user_reg  = http('fp-simple-user-reg');
  fp_opal_estate      = http('fp-opal-estate');
  fp_truelysell       = http('fp-truelysell');
  fp_mobile_builder   = http('fp-mobile-builder');
  fp_ai_engine        = http('fp-ai-engine');
  fp_pie_register     = http('fp-pie-register');
  fp_frontend_admin   = http('fp-frontend-admin');
  fp_tax_hdm          = http('fp-tax-hdm');
  fp_woo_designer     = http('fp-woo-designer');
  fp_ninja_forms      = http('fp-ninja-forms');
  fp_user_reg_adv     = http('fp-user-reg-adv');
  fp_user_reg_membership = http('fp-user-reg-membership');
  fp_breeze_cache     = http('fp-breeze-cache');
  fp_listeo_core      = http('fp-listeo-core');
  fp_betterdocs       = http('fp-betterdocs');
  fp_team_plugin      = http('fp-team-plugin');
  fp_wp_automatic     = http('fp-wp-automatic');

  /* Phase 2 — Version checks (only if plugin present); assign result to vuln_* */
  vuln_suretriggers     = fp_suretriggers     && http('ver-suretriggers');
  vuln_king_addons      = fp_king_addons      && http('ver-king-addons');
  vuln_simple_user_reg  = fp_simple_user_reg  && http('ver-simple-user-reg');
  vuln_opal_estate      = fp_opal_estate      && http('ver-opal-estate');
  vuln_truelysell       = fp_truelysell       && http('ver-truelysell');
  vuln_mobile_builder   = fp_mobile_builder   && http('ver-mobile-builder');
  vuln_ai_engine        = fp_ai_engine        && http('ver-ai-engine');
  vuln_pie_register     = fp_pie_register     && http('ver-pie-register');
  vuln_frontend_admin   = fp_frontend_admin   && http('ver-frontend-admin');
  vuln_tax_hdm          = fp_tax_hdm          && http('ver-tax-hdm');
  vuln_woo_designer     = fp_woo_designer     && http('ver-woo-designer');
  vuln_ninja_forms      = fp_ninja_forms      && http('ver-ninja-forms');
  vuln_user_reg_adv     = fp_user_reg_adv     && http('ver-user-reg-adv');
  vuln_user_reg_membership = fp_user_reg_membership && http('ver-user-reg-membership');
  vuln_breeze_cache     = fp_breeze_cache     && http('ver-breeze-cache');
  vuln_listeo_core      = fp_listeo_core      && http('ver-listeo-core');
  vuln_betterdocs       = fp_betterdocs       && http('ver-betterdocs');
  vuln_team_plugin      = fp_team_plugin      && http('ver-team-plugin');
  vuln_wp_automatic     = fp_wp_automatic     && http('ver-wp-automatic');

  /* Phase 3 — Advanced probes (optional, results also stored in vuln_*) */
  vuln_ai_engine     = vuln_ai_engine     || (fp_ai_engine    && http('ai-engine-token-check'));
  vuln_wp_automatic  = vuln_wp_automatic  || (fp_wp_automatic && http('wp-automatic-sqli-probe'));

# Template‑level matcher: raise a finding if ANY vuln_* flag is true
matchers:
  - type: dsl
    dsl:
      - "vuln_suretriggers || vuln_king_addons || vuln_simple_user_reg || vuln_opal_estate || vuln_truelysell || vuln_mobile_builder || vuln_ai_engine || vuln_pie_register || vuln_frontend_admin || vuln_tax_hdm || vuln_woo_designer || vuln_ninja_forms || vuln_user_reg_adv || vuln_user_reg_membership || vuln_breeze_cache || vuln_listeo_core || vuln_betterdocs || vuln_team_plugin || vuln_wp_automatic"

