  # ---- Advanced probes (internal) ----
  - id: ai-engine-token-check
    method: GET
    path: ["{{BaseURL}}/wp-json/ai-engine/v1/me"]
    headers: {User-Agent: "{{rand_user_agent}}"}
    matchers-condition: or
    matchers:
      - type: status
